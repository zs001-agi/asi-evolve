name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        shell: cmd
        run: git clone --depth 1 https://github.com/zs001-agi/asi-evolve.git %RUNNER_TEMP%\asi-evolve

      - name: Install and Test
        shell: cmd
        run: |
          cd %RUNNER_TEMP%\asi-evolve
          D:\Python312\python.exe -m pip install -e . --quiet
          D:\Python312\python.exe -c "from evolve_core import Gene, GeneType, Chromosome, EvolutionConfig, EvolutionStrategy, EvolutionaryAlgorithm, AbilityEvolver; print('All imports OK')"
          D:\Python312\python.exe -c "from evolve_core import EvolutionaryAlgorithm, EvolutionConfig; c=EvolutionConfig(population_size=10,elite_size=2,generations=5); ea=EvolutionaryAlgorithm(c); ea.initialize([{'key':'x','min':-10,'max':10}]); [ea.evolve(lambda c:abs(c.get_value('x',0))) for _ in range(5)]; print('GA OK')"
          D:\Python312\python.exe -c "from evolve_core import Chromosome; c=Chromosome.random([{'key':'a','min':0,'max':1}]); d=c.to_dict(); assert 'chromosome_id' in d; print('Serialize OK')"
          D:\Python312\python.exe -c "import urllib.request,json; r=urllib.request.urlopen('http://localhost:11434/api/tags',timeout=5); m=json.loads(r.read()).get('models',[]); print('Ollama:', len(m), 'models')"
